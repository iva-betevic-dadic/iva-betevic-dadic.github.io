<html>
<head>
<title>JavaScript vjezba 4</title>
<script>
var danas=new Date();
var dan=danas.getDate();
var mjesec=danas.getMonth();
mjesec=mjesec+1;
var godina=danas.getFullYear();
var datum=dan+"/"+mjesec+"/"+godina;
var sat=danas.getHours();
var min=danas.getMinutes();
var sek=danas.getSeconds();
var vrijeme=sat+":"+min+":"+sek;
</script>
</head>
<body>
Današnji datum je:
<script>
document.write(datum);
</script>
<br>
Trenutno vrijeme je:
<center>
<script>
document.write("<br><br><br><h2><b><i>"+vrijeme+"</i></b></h2>");
</script>
</center>
</body>
</html>
