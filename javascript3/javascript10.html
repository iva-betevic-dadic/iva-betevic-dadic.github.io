<html>
<head>
<title>Javascript - vježba 10</title>
<script language="javascript">
function rezultat()
{
var tocnih = 0;
if (window.document.forma.pitanje1.checked == true)
{tocnih = tocnih + 1;}
else
{window.document.forma.pitanje1.checked = true;}
if (window.document.forma.pitanje2.checked == false)
{tocnih = tocnih + 1;}
else
{window.document.forma.pitanje2.checked = false;}
if (window.document.forma.pitanje3.checked == true)
{tocnih = tocnih + 1;}
else
{window.document.forma.pitanje3.checked = true;}
if (window.document.forma.pitanje4.checked == false)
{tocnih = tocnih + 1;}
else
{window.document.forma.pitanje4.checked = false;}
alert("Imate " + tocnih + " točnih odgovora. Nakon klika prikazani su ispravni odgovori.");
}
</script>
</head>
<body>
<h2>Riješite kratki kviz:</h2>
<form name="forma">
<input type="checkbox" name="pitanje1">
Računalo obrađuje podatke.<br>
<input type="checkbox" name="pitanje2">
Miš je izlazni uređaj.<br>
<input type="checkbox" name="pitanje3">
Tipkovnica je ulazni uređaj.<br>
<input type="checkbox" name="pitanje4">
Internet služi isključivo za igranje igrica.<br>
<input type="button" value="Prikaži rezultate" onclick="rezultat();">
</form>
</body>
</html>
